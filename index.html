document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

;\">{{ currentTime }} {{ currentAp }}<\u002Fdiv>\n      <div style=\"font-size:21px;font-weight:700;color:#000;\">Expires: {{ expiresDate }}<\u002Fdiv>\n      <div style=\"font-size:21px;font-weight:700;color:#000;\">{{ expiresTime }}<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- FOOTER -->\n  <div style=\"flex:none;background:#000;display:flex;align-items:flex-start;justify-content:space-around;padding:12px 8px max(26px, env(safe-area-inset-bottom));\">\n    <div style=\"display:flex;flex-direction:column;align-items:center;gap:5px;width:70px;\">\n      <img src=\"8e901780-2b5e-4949-a95f-8b23cab73c30\" alt=\"\" style=\"height:26px;width:auto;display:block;\">\n      <span style=\"font-size:12px;font-weight:600;letter-spacing:0.3px;color:#9ba1a6;\">HOME<\u002Fspan>\n    <\u002Fdiv>\n    <div style=\"display:flex;flex-direction:column;align-items:center;gap:5px;width:70px;\">\n      <img src=\"1f03e547-b452-4302-a510-f1a351524e13\" alt=\"\" style=\"height:27px;width:auto;display:block;\">\n      <span style=\"font-size:12px;font-weight:600;letter-spacing:0.3px;color:#9ba1a6;\">TRACK<\u002Fspan>\n    <\u002Fdiv>\n    <div style=\"display:flex;flex-direction:column;align-items:center;gap:5px;width:70px;\">\n      <img src=\"3d047788-9417-45fa-9048-f705d230c296\" alt=\"\" style=\"height:28px;width:auto;display:block;\">\n      <span style=\"font-size:12px;font-weight:700;letter-spacing:0.3px;color:#fff;\">BUY<\u002Fspan>\n    <\u002Fdiv>\n    <div onclick=\"{{ togglePanel }}\" style=\"display:flex;flex-direction:column;align-items:center;gap:5px;width:70px;cursor:pointer;\">\n      <img src=\"229fd729-ee91-4613-a44b-dad40d14fa73\" alt=\"\" style=\"height:15px;width:auto;display:block;margin:6px 0 5px;\">\n      <span style=\"font-size:12px;font-weight:600;letter-spacing:0.3px;color:#9ba1a6;\">MENU<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- EDIT PANEL -->\n  <sc-if value=\"{{ panelOpen }}\" hint-placeholder-val=\"{{ false }}\">\n    <div style=\"position:absolute;inset:0;background:rgba(0,0,0,0.4);z-index:50;display:flex;align-items:flex-end;\" onclick=\"{{ closePanel }}\">\n      <div onclick=\"{{ stop }}\" style=\"width:100%;max-height:88dvh;overflow-y:auto;background:#fff;border-radius:18px 18px 0 0;padding:20px 20px max(24px, env(safe-area-inset-bottom));box-shadow:0 -6px 24px rgba(0,0,0,0.2);font-family:-apple-system,system-ui,sans-serif;\">\n        <div style=\"width:38px;height:5px;border-radius:3px;background:#dcdcdc;margin:0 auto 16px;\"><\u002Fdiv>\n        <div style=\"display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;\">\n          <div style=\"font-size:20px;font-weight:700;color:#111;\">Edit pass<\u002Fdiv>\n          <button onclick=\"{{ closePanel }}\" style=\"border:none;background:#eee;border-radius:50%;width:30px;height:30px;font-size:16px;color:#555;cursor:pointer;\">✕<\u002Fbutton>\n        <\u002Fdiv>\n\n        <label style=\"display:block;font-size:12px;font-weight:600;color:#777;margin-bottom:5px;text-transform:uppercase;letter-spacing:0.4px;\">Current time<\u002Flabel>\n        <input type=\"time\" step=\"1\" value=\"{{ draftTime }}\" onchange=\"{{ onCurrentTime }}\" style=\"width:100%;padding:11px 12px;font-size:16px;border:1px solid #ddd;border-radius:10px;\">\n        <div style=\"font-size:12px;color:#999;margin:5px 2px 14px;\">The on-screen clock starts ticking from this time.<\u002Fdiv>\n\n        <div style=\"display:flex;gap:12px;margin-bottom:14px;\">\n          <div style=\"flex:2;\">\n            <label style=\"display:block;font-size:12px;font-weight:600;color:#777;margin-bottom:5px;text-transform:uppercase;letter-spacing:0.4px;\">Day of week<\u002Flabel>\n            <select value=\"{{ draftDayName }}\" onchange=\"{{ onDayName }}\" style=\"width:100%;padding:11px 12px;font-size:16px;border:1px solid #ddd;border-radius:10px;background:#fff;appearance:auto;\">\n              <option value=\"MONDAY\">Monday<\u002Foption>\n              <option value=\"TUESDAY\">Tuesday<\u002Foption>\n              <option value=\"WEDNESDAY\">Wednesday<\u002Foption>\n              <option value=\"THURSDAY\">Thursday<\u002Foption>\n              <option value=\"FRIDAY\">Friday<\u002Foption>\n              <option value=\"SATURDAY\">Saturday<\u002Foption>\n              <option value=\"SUNDAY\">Sunday<\u002Foption>\n            <\u002Fselect>\n          <\u002Fdiv>\n          <div style=\"flex:1;\">\n            <label style=\"display:block;font-size:12px;font-weight:600;color:#777;margin-bottom:5px;text-transform:uppercase;letter-spacing:0.4px;\">Date<\u002Flabel>\n            <select value=\"{{ draftDayNum }}\" onchange=\"{{ onDayNum }}\" style=\"width:100%;padding:11px 12px;font-size:16px;border:1px solid #ddd;border-radius:10px;background:#fff;appearance:auto;\">\n              <option value=\"1\">1<\u002Foption><option value=\"2\">2<\u002Foption><option value=\"3\">3<\u002Foption><option value=\"4\">4<\u002Foption><option value=\"5\">5<\u002Foption><option value=\"6\">6<\u002Foption><option value=\"7\">7<\u002Foption><option value=\"8\">8<\u002Foption><option value=\"9\">9<\u002Foption><option value=\"10\">10<\u002Foption><option value=\"11\">11<\u002Foption><option value=\"12\">12<\u002Foption><option value=\"13\">13<\u002Foption><option value=\"14\">14<\u002Foption><option value=\"15\">15<\u002Foption><option value=\"16\">16<\u002Foption><option value=\"17\">17<\u002Foption><option value=\"18\">18<\u002Foption><option value=\"19\">19<\u002Foption><option value=\"20\">20<\u002Foption><option value=\"21\">21<\u002Foption><option value=\"22\">22<\u002Foption><option value=\"23\">23<\u002Foption><option value=\"24\">24<\u002Foption><option value=\"25\">25<\u002Foption><option value=\"26\">26<\u002Foption><option value=\"27\">27<\u002Foption><option value=\"28\">28<\u002Foption><option value=\"29\">29<\u002Foption><option value=\"30\">30<\u002Foption><option value=\"31\">31<\u002Foption>\n            <\u002Fselect>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <label style=\"display:block;font-size:12px;font-weight:600;color:#777;margin-bottom:5px;text-transform:uppercase;letter-spacing:0.4px;\">Expires date<\u002Flabel>\n        <input type=\"date\" value=\"{{ draftExpDate }}\" onchange=\"{{ onExpDate }}\" style=\"width:100%;padding:11px 12px;font-size:16px;border:1px solid #ddd;border-radius:10px;margin-bottom:14px;\">\n\n        <label style=\"display:block;font-size:12px;font-weight:600;color:#777;margin-bottom:5px;text-transform:uppercase;letter-spacing:0.4px;\">Expires time<\u002Flabel>\n        <input type=\"time\" step=\"1\" value=\"{{ draftExpTime }}\" onchange=\"{{ onExpTime }}\" style=\"width:100%;padding:11px 12px;font-size:16px;border:1px solid #ddd;border-radius:10px;\">\n        <div style=\"font-size:12px;color:#999;margin:5px 2px 20px;\">Hours, minutes, seconds — AM/PM set automatically.<\u002Fdiv>\n\n        <button onclick=\"{{ savePanel }}\" style=\"width:100%;padding:15px;font-size:17px;font-weight:600;color:#fff;background:#000;border:none;border-radius:12px;cursor:pointer;\">Save<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:430,&quot;height&quot;:932}}\">\nclass Component extends DCLogic {\n  state = (() => {\n    const now = new Date();\n    const pad = (n) => String(n).padStart(2, '0');\n    const days = ['SUNDAY','MONDAY','TUESDAY','WEDNESDAY','THURSDAY','FRIDAY','SATURDAY'];\n    const exp = new Date(now.getTime() + (2 * 60 + 55) * 60000);\n    return {\n      clock: now,\n      qrIndex: 0,\n      qrCodes: [],\n      dayName: days[now.getDay()],\n      dayNum: String(now.getDate()),\n      expiresDateRaw: now.getFullYear() + '-' + pad(now.getMonth() + 1) + '-' + pad(now.getDate()),\n      expiresTimeRaw: pad(exp.getHours()) + ':' + pad(exp.getMinutes()) + ':' + pad(exp.getSeconds()),\n      panelOpen: false,\n      standalone: false,\n      draft: null,\n    };\n  })();\n\n  componentDidMount() {\n    try {\n      const sa = (window.navigator && window.navigator.standalone === true) ||\n        (window.matchMedia && window.matchMedia('(display-mode: standalone)').matches) ||\n        (window.matchMedia && window.matchMedia('(display-mode: fullscreen)').matches);\n      if (sa) this.setState({ standalone: true });\n    } catch (e) { /* ignore */ }\n    this._timer = setInterval(() => {\n      this.setState(s => {\n        const c = new Date(s.clock.getTime() + 1000);\n        const qi = s.qrCodes.length ? (s.qrIndex + 1) % s.qrCodes.length : 0;\n        return { clock: c, qrIndex: qi };\n      });\n    }, 1000);\n    this._waitQR();\n  }\n\n  _waitQR() {\n    if (typeof window !== 'undefined' && window.qrcode) { this._genQR(); return; }\n    this._qrPoll = setTimeout(() => this._waitQR(), 120);\n  }\n\n  _genQR() {\n    const codes = [];\n    for (let i = 0; i < 10; i++) {\n      try {\n        const qr = window.qrcode(0, 'M');\n        qr.addData(this._token(i));\n        qr.make();\n        codes.push(qr.createDataURL(7, 0));\n      } catch (e) { /* ignore */ }\n    }\n    if (codes.length) this.setState({ qrCodes: codes });\n  }\n\n  _token(i) {\n    let x = ((i + 1) * 2654435761) % 2147483647;\n    const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ0123456789';\n    let s = 'MASV.' + (i + 1) + '.';\n    for (let k = 0; k < 96; k++) { x = (x * 1103515245 + 12345) & 0x7fffffff; s += chars[x % chars.length]; }\n    return s;\n  }\n\n  componentWillUnmount() { clearInterval(this._timer); clearTimeout(this._qrPoll); }\n\n  _fmt(d) {\n    let h = d.getHours(), m = d.getMinutes(), s = d.getSeconds();\n    const ap = h >= 12 ? 'PM' : 'AM';\n    const h24 = String(h).padStart(2, '0');\n    const mm = String(m).padStart(2, '0'), ss = String(s).padStart(2, '0');\n    h = h % 12; if (h === 0) h = 12;\n    return { hm: h + ':' + mm, hms: h + ':' + mm + ':' + ss, ap, input: h24 + ':' + mm + ':' + ss };\n  }\n\n  _plusExp(timeInput) {\n    const p = (timeInput || '').split(':').map(Number);\n    const pad = (n) => String(n).padStart(2, '0');\n    const d = new Date();\n    d.setHours(p[0] || 0, p[1] || 0, p[2] || 0, 0);\n    const e = new Date(d.getTime() + (2 * 60 + 55) * 60000);\n    return pad(e.getHours()) + ':' + pad(e.getMinutes()) + ':' + pad(e.getSeconds());\n  }\n\n  _expDateDisplay() {\n    const p = (this.state.expiresDateRaw || '').split('-').map(Number);\n    if (p.length < 3) return '';\n    return (p[1] || 0) + '/' + (p[2] || 0) + '/' + (p[0] || 0);\n  }\n\n  _expTimeDisplay() {\n    const p = (this.state.expiresTimeRaw || '').split(':').map(Number);\n    let h = p[0] || 0;\n    const mm = String(p[1] || 0).padStart(2, '0');\n    const ss = String(p[2] || 0).padStart(2, '0');\n    const ap = h >= 12 ? 'PM' : 'AM';\n    h = h % 12; if (h === 0) h = 12;\n    return h + ':' + mm + ':' + ss + ' ' + ap;\n  }\n\n  renderVals() {\n    const t = this._fmt(this.state.clock);\n    const codes = this.state.qrCodes;\n    const qrSrc = codes.length ? codes[this.state.qrIndex % codes.length] : '';\n    const qrEl = qrSrc\n      ? React.createElement('img', { src: qrSrc, alt: 'QR', style: { width: 150, height: 150, imageRendering: 'pixelated', display: 'block' } })\n      : React.createElement('div', { style: { width: 138, height: 138, background: 'repeating-linear-gradient(45deg,#eee,#eee 6px,#f7f7f7 6px,#f7f7f7 12px)' } });\n    const d = this.state.draft || {};\n    return {\n      showFakeStatus: !this.state.standalone,\n      statusTime: t.hm,\n      currentTime: t.hms,\n      currentAp: t.ap,\n      qrEl,\n      dayUpper: (this.state.dayName || '').toUpperCase(),\n      dayNum: this.state.dayNum,\n      expiresDate: this._expDateDisplay(),\n      expiresTime: this._expTimeDisplay(),\n      panelOpen: this.state.panelOpen,\n      draftDayName: d.dayName,\n      draftDayNum: d.dayNum,\n      draftTime: d.timeInput,\n      draftExpDate: d.expiresDateRaw,\n      draftExpTime: d.expiresTimeRaw,\n      togglePanel: () => this.setState(s => ({\n        panelOpen: true,\n        draft: {\n          timeInput: this._fmt(s.clock).input,\n          dayName: s.dayName,\n          dayNum: s.dayNum,\n          expiresDateRaw: s.expiresDateRaw,\n          expiresTimeRaw: s.expiresTimeRaw,\n          expEdited: false,\n        },\n      })),\n      closePanel: () => this.setState({ panelOpen: false, draft: null }),\n      savePanel: () => this.setState(s => {\n        const dr = s.draft || {};\n        const timeInput = dr.timeInput || this._fmt(s.clock).input;\n        const next = {\n          panelOpen: false,\n          draft: null,\n          dayName: dr.dayName,\n          dayNum: dr.dayNum,\n          expiresDateRaw: dr.expiresDateRaw,\n          expiresTimeRaw: dr.expEdited ? dr.expiresTimeRaw : this._plusExp(timeInput),\n        };\n        if (dr.timeInput) {\n          const p = dr.timeInput.split(':').map(Number);\n          const c = new Date();\n          c.setHours(p[0] || 0, p[1] || 0, p[2] || 0, 0);\n          next.clock = c;\n        }\n        return next;\n      }),\n      stop: (e) => e.stopPropagation(),\n      onDayName: (e) => { const v = e.target.value; this.setState(s => ({ draft: { ...s.draft, dayName: v } })); },\n      onDayNum: (e) => { const v = e.target.value; this.setState(s => ({ draft: { ...s.draft, dayNum: v } })); },\n      onExpDate: (e) => { const v = e.target.value; if (v) this.setState(s => ({ draft: { ...s.draft, expiresDateRaw: v } })); },\n      onExpTime: (e) => { const v = e.target.value; if (v) this.setState(s => ({ draft: { ...s.draft, expiresTimeRaw: v, expEdited: true } })); },\n      onCurrentTime: (e) => { const v = e.target.value; if (v) this.setState(s => ({ draft: { ...s.draft, timeInput: v } })); },\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
